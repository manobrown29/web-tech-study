<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/nota.css">
    <title>Nota do Aluno</title>
</head>
<body>
    <main class="container">
        <form action="">
            <article class="form-control">
                <label for="nota">Digite a nota do aluno: </label>
                <input type="number" min="0" max="10" id="nota">
            </article>
            
            <section id="message">
                <span>Digite sua nota!!"</span>
            </section>
            <button id="verifica-nota" onclick="resultadoNotaClick(event)">Verificar nota</button>
            
            <div id="resultado"></div>
        </form>
    </main>

    <script src="js/nota.js"></script>
</body>
</html>
